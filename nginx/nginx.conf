events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain text/css application/json application/javascript;

    # Detect crawlers and social preview bots
    map $http_user_agent $is_bot {
        default                     0;
        "~*googlebot"               1;
        "~*bingbot"                 1;
        "~*yandex"                  1;
        "~*baiduspider"             1;
        "~*facebookexternalhit"     1;
        "~*twitterbot"              1;
        "~*rogerbot"                1;
        "~*linkedinbot"             1;
        "~*embedly"                 1;
        "~*showyoubot"              1;
        "~*outbrain"                1;
        "~*pinterest"               1;
        "~*slackbot"                1;
        "~*vkshare"                 1;
        "~*w3c_validator"           1;
        "~*discordbot"              1;
        "~*whatsapp"                1;
    }

    server {
        listen 80;
        server_name howmanyareplaying.com www.howmanyareplaying.com;

        # API proxy → backend
        location /api/ {
            proxy_pass         http://backend:3001;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /health {
            proxy_pass http://backend:3001;
        }

        # Sitemap — served by backend
        location = /sitemap.xml {
            proxy_pass         http://backend:3001;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Static assets — never prerender
        location ~* \.(js|css|map|ico|svg|png|jpg|jpeg|gif|woff|woff2|ttf|eot)$ {
            proxy_pass       http://frontend:80;
            proxy_set_header Host $host;
        }

        # SPA — serve prerendered HTML to bots, React app to humans
        location / {
            set $prerender $is_bot;

            # Don't prerender the prerender service's own requests (avoids loops)
            if ($http_user_agent ~ "Prerender") {
                set $prerender 0;
            }

            if ($prerender = 1) {
                rewrite .* /$scheme://$host$request_uri? break;
                proxy_pass http://prerender:3000;
            }

            proxy_pass       http://frontend:80;
            proxy_set_header Host $host;
        }
    }
}
